# nginx reverse proxy for dansal + dansal-web
#
# dansal REST API  listens on 127.0.0.1:8000
# dansal-web       listens on 127.0.0.1:8080
#
# Both are exposed on the same domain:
#   https://events.example.com/         → web frontend (HTML + ActivityPub)
#   https://events.example.com/api/     → REST API
#
# Replace events.example.com with your actual domain and adjust the
# TLS certificate paths (certbot / Let's Encrypt recommended).

upstream dansal_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream dansal_web {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name events.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name events.example.com;

    ssl_certificate     /etc/letsencrypt/live/events.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/events.example.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # REST API — proxied by path prefix
    location /api/ {
        proxy_pass         http://dansal_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # Web frontend — everything else (HTML pages + ActivityPub endpoints)
    location / {
        proxy_pass         http://dansal_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }
}

# ── Alternative: split-domain setup ──────────────────────────────────────────
# Use this block instead if you prefer separate hostnames:
#   https://api.example.com    → REST API only
#   https://events.example.com → web frontend only
