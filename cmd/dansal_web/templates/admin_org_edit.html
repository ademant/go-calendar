{{template "base" .}}
{{define "content"}}
<h1>{{.Strings.T "admin_edit"}}{{with .Data.Org.Name}} — {{.}}{{end}}</h1>

<div class="edit-wrap">
{{with .Data}}
{{if .ErrorKey}}<p class="form-error" role="alert">{{$.Strings.T .ErrorKey}}</p>{{end}}
<form method="post" class="edit-form">
  <label for="name">{{$.Strings.T "org_name"}}</label>
  <input id="name" type="text" name="name" value="{{.Org.Name}}" required>

  <label for="description">{{$.Strings.T "org_description"}}</label>
  <textarea id="description" name="description" rows="4">{{.Org.Description}}</textarea>

  <label for="actor_name">{{$.Strings.T "org_actor_name"}}</label>
  <input id="actor_name" type="text" name="actor_name" value="{{.Org.ActorName}}" placeholder="my-org">
  <p class="field-hint">{{$.Strings.T "org_actor_name_hint"}}</p>

  <label for="website">{{$.Strings.T "org_website"}}</label>
  <input id="website" type="url" name="website" value="{{.Org.Website}}" placeholder="https://example.org">

  <label for="contact_email">{{$.Strings.T "org_contact_email"}}</label>
  <input id="contact_email" type="email" name="contact_email" value="{{.Org.ContactEmail}}">

  <fieldset class="social-fieldset">
    <legend>{{$.Strings.T "org_social"}}</legend>

    <label for="mastodon">{{$.Strings.T "org_mastodon"}}</label>
    <input id="mastodon" type="text" name="mastodon" value="{{.Org.Mastodon}}" placeholder="@org@mastodon.social">

    <label for="instagram">{{$.Strings.T "org_instagram"}}</label>
    <input id="instagram" type="text" name="instagram" value="{{.Org.Instagram}}" placeholder="myorg">

    <label for="facebook">{{$.Strings.T "org_facebook"}}</label>
    <input id="facebook" type="text" name="facebook" value="{{.Org.Facebook}}" placeholder="myorg">
  </fieldset>

  <div class="form-actions">
    <button type="submit" class="btn-primary">{{$.Strings.T "admin_save"}}</button>
    <a href="/admin/organizations" class="btn-secondary">{{$.Strings.T "admin_cancel"}}</a>
  </div>
</form>
{{end}}
</div>

<style>
.edit-wrap{max-width:560px}
.form-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:4px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.9rem}
.edit-form{display:flex;flex-direction:column;gap:.5rem;background:#fff;border:1px solid #ddd;border-radius:6px;padding:1.5rem}
.edit-form label{font-weight:600;font-size:.9rem;color:#444;margin-top:.25rem}
.edit-form input,.edit-form textarea{padding:.45rem .6rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;width:100%;resize:vertical}
.edit-form input:focus,.edit-form textarea:focus{outline:2px solid #1a6eb5;border-color:#1a6eb5}
.field-hint{margin:0;font-size:.8rem;color:#777}
.social-fieldset{border:1px solid #ddd;border-radius:4px;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem;margin-top:.25rem}
.social-fieldset legend{font-weight:600;font-size:.9rem;color:#444;padding:0 .25rem}
.form-actions{display:flex;gap:.75rem;margin-top:.75rem}
.btn-primary{padding:.45rem 1.2rem;background:#1a6eb5;color:#fff;border:none;border-radius:4px;font-size:.95rem;cursor:pointer}
.btn-primary:hover{background:#0d4a80}
.btn-secondary{padding:.45rem 1.2rem;background:#f5f5f5;color:#333;border:1px solid #ccc;border-radius:4px;font-size:.95rem;text-decoration:none;cursor:pointer}
.btn-secondary:hover{background:#e8e8e8}
</style>
{{end}}
