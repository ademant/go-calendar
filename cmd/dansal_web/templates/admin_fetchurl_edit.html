{{template "base" .}}
{{define "content"}}
<h1>{{.Strings.T "admin_edit"}} — {{with .Data}}{{.Source.URL}}{{end}}</h1>

<div class="edit-wrap">
{{with .Data}}
{{if .ErrorKey}}<p class="form-error" role="alert">{{$.Strings.T .ErrorKey}}</p>{{end}}
<form method="post" class="edit-form">
  <label>{{$.Strings.T "fetch_url"}}</label>
  <input type="text" value="{{.Source.URL}}" disabled class="input-disabled">

  <label for="type">{{$.Strings.T "fetch_type"}}</label>
  <select id="type" name="type">
    <option value="ical"{{if eq .Source.Type "ical"}} selected{{end}}>iCal</option>
    <option value="folkdance-json"{{if eq .Source.Type "folkdance-json"}} selected{{end}}>folkdance-json</option>
  </select>

  <label for="tags">{{$.Strings.T "fetch_tags"}}</label>
  <input id="tags" type="text" name="tags" value="{{range .Source.Tags}}{{.}} {{end}}">

  <label for="organization_id">{{$.Strings.T "fetch_org"}}</label>
  <select id="organization_id" name="organization_id">
    <option value="">—</option>
    {{range .Orgs}}
    <option value="{{.ID}}"{{if $.Data.Source.OrganizationID}}{{if eq (derefInt $.Data.Source.OrganizationID) .ID}} selected{{end}}{{end}}>{{.Name}}</option>
    {{end}}
  </select>

  {{if .Dances}}
  <label>Dance styles</label>
  <div class="dance-checkboxes">
    {{range .Dances}}
    <label class="check-label"><input type="checkbox" name="dance_ids" value="{{.ID}}"{{if index $.Data.SelectedDanceNames .Name}} checked{{end}}> {{.Name}}</label>
    {{end}}
  </div>
  {{end}}

  <div class="form-actions">
    <button type="submit" class="btn-primary">{{$.Strings.T "admin_save"}}</button>
    <a href="/admin/fetchurls" class="btn-secondary">{{$.Strings.T "admin_cancel"}}</a>
  </div>
</form>
{{end}}
</div>

<style>
.edit-wrap{max-width:560px}
.form-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:4px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.9rem}
.edit-form{display:flex;flex-direction:column;gap:.6rem;background:#fff;border:1px solid #ddd;border-radius:6px;padding:1.5rem}
.edit-form label{font-weight:600;font-size:.9rem;color:#444}
.edit-form input,.edit-form select{padding:.45rem .6rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;width:100%}
.edit-form input:focus,.edit-form select:focus{outline:2px solid #1a6eb5;border-color:#1a6eb5}
.input-disabled{background:#f5f5f5;color:#666}
.dance-checkboxes{display:flex;flex-wrap:wrap;gap:.25rem .5rem;margin:.25rem 0}
.check-label{display:flex;align-items:center;gap:.35rem;font-size:.92rem;cursor:pointer;font-weight:normal}
.check-label input{width:auto}
.form-actions{display:flex;gap:.75rem;margin-top:.5rem}
.btn-primary{padding:.45rem 1.2rem;background:#1a6eb5;color:#fff;border:none;border-radius:4px;font-size:.95rem;cursor:pointer}
.btn-primary:hover{background:#0d4a80}
.btn-secondary{padding:.45rem 1.2rem;background:#f5f5f5;color:#333;border:1px solid #ccc;border-radius:4px;font-size:.95rem;text-decoration:none;cursor:pointer}
.btn-secondary:hover{background:#e8e8e8}
</style>
{{end}}
