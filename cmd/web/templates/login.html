{{template "base" .}}
{{define "content"}}
<h1>Login</h1>

<div class="login-wrap">
  {{with .Data}}
  {{if .Error}}<p class="login-error" role="alert">{{.Error}}</p>{{end}}
  <form method="post" action="/login" class="login-form" autocomplete="on">
    <label for="username">Username</label>
    <input id="username" type="text" name="username" value="{{.Username}}"
           required autofocus autocomplete="username">
    <label for="password">Password</label>
    <input id="password" type="password" name="password"
           required autocomplete="current-password">
    <button type="submit">Login</button>
  </form>
  {{end}}
</div>

<style>
.login-wrap{max-width:360px;margin:2rem auto}
.login-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:4px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.9rem}
.login-form{display:flex;flex-direction:column;gap:.6rem;background:#fff;border:1px solid #ddd;border-radius:6px;padding:1.5rem}
.login-form label{font-weight:600;font-size:.9rem;color:#444}
.login-form input{padding:.45rem .6rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;width:100%}
.login-form input:focus{outline:2px solid #1a6eb5;border-color:#1a6eb5}
.login-form button{margin-top:.4rem;padding:.5rem;background:#1a6eb5;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer}
.login-form button:hover{background:#0d4a80}
</style>
{{end}}
