name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-dansal build-dansal_admin

  package:
    name: Package (.deb)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build binaries
        run: make build-dansal build-dansal_admin

      - name: Build amd64 .deb
        run: |
          DEB_VERSION="${GITHUB_REF_NAME#v}"
          make deb DEB_VERSION="${DEB_VERSION}" DEB_ARCH=amd64

      - name: Build arm64 .deb
        run: |
          DEB_VERSION="${GITHUB_REF_NAME#v}"
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CGO_ENABLED=1 GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags "-X main.Version=${DEB_VERSION} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dansal ./cmd/dansal
          go build -o dansal_admin ./cmd/dansal_admin
          make deb DEB_VERSION="${DEB_VERSION}" DEB_ARCH=arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.deb'
          generate_release_notes: true
