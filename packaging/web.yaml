# dansal-web configuration
# Install to /etc/dansal/web.yaml

# Address and port the web frontend listens on (loopback only; nginx/traefik terminate TLS).
listen: "127.0.0.1:8080"

# Public domain name used to construct ActivityPub actor URLs.
# Must match the domain served by your reverse proxy.
domain: "events.example.com"

# Override the canonical public URL. Defaults to https://{domain} when unset.
# Set this if the web app is served under a sub-path or non-standard port.
# base_url: "https://events.example.com"

# Internal URL of the dansal REST API.
dansal_url: "http://127.0.0.1:8000"

# Path to the SQLite database used to store AP keys and followers.
db_path: /var/lib/dansal-web/web.db

# How often (seconds) the delivery worker polls the dansal API for new
# published events and pushes them to follower inboxes.
poll_secs: 300

# --- Content ---

# Optional: path to a YAML file containing per-language contact info and
# impressum text. If omitted, no contact line or Impressum link appears.
# The file is re-read on every /impressum request (no restart needed).
#
# Example /etc/dansal/pages.yaml:
#
#   contact:
#     de: "Kontakt: kontakt@example.com"
#     en: "Contact: kontakt@example.com"
#   impressum:
#     de: |
#       Angaben gemäß § 5 TMG
#       Max Mustermann, Musterstraße 1, 12345 Berlin
#
# pages_file: /etc/dansal/pages.yaml

# Optional: path to a YAML file that overrides the embedded translations.
# Useful for customising UI strings without rebuilding the binary.
# i18n_file: /etc/dansal/i18n.yaml

# --- Federation ---

# Whether to show events federated from followed organisations in the main
# event list. Federated events are always stored in the local database;
# this only controls their visibility on the public index page.
show_federated_events: false

# NodeInfo metadata served at /nodeinfo/2.1 (used by fediverse crawlers).
nodeinfo_description: ""
nodeinfo_maintainer_name: ""
nodeinfo_maintainer_email: ""

# --- Appearance ---

# Display name shown in the navigation header and browser title.
# Can also be set via the admin site-config page (that value takes precedence).
# Defaults to the domain name when unset.
# site_name: "My Dance Events"

# Directory for uploaded site assets (logo, banner, favicon).
# Defaults to /var/lib/dansal-web (the service state directory).
# Override only if you want to store assets elsewhere.
# images_dir: /var/lib/dansal-web

# Banner height in pixels on the main page (0 = hidden).
banner_height_main: 200

# Banner height in pixels on sub-pages (0 = hidden, the default).
banner_height_sub: 0

# Logo height in pixels in the navigation bar.
logo_height_main: 48
logo_height_sub: 32

# Colour scheme: auto (follow OS preference), light, or dark.
dark_mode: auto
