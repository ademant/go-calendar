<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .navy { fill: #10263f; }
      .gold { fill: #c8873a; }
      .stroke-navy { stroke: #10263f; stroke-width: 10; fill: none; }
      .text-main {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- Outer circle -->
  <circle cx="256" cy="256" r="230" class="stroke-navy"/>

  <!-- Decorative leaves -->
  <g class="gold" opacity="0.9">
    <path d="M130 150 C110 135, 100 120, 96 98 C116 112, 126 128, 130 150 Z"/>
    <path d="M382 150 C402 135, 412 120, 416 98 C396 112, 386 128, 382 150 Z"/>
    <path d="M210 410 C195 422, 180 430, 165 434 C180 420, 194 412, 210 410 Z"/>
    <path d="M302 410 C317 422, 332 430, 347 434 C332 420, 318 412, 302 410 Z"/>
  </g>

  <!-- Accordion -->
  <g class="navy" transform="translate(95,220)">
    <rect x="0" y="0" width="55" height="80" rx="6"/>
    <rect x="55" y="5" width="35" height="70" rx="4"/>
    <line x1="60" y1="10" x2="60" y2="70" stroke="white" stroke-width="2"/>
    <line x1="68" y1="10" x2="68" y2="70" stroke="white" stroke-width="2"/>
    <line x1="76" y1="10" x2="76" y2="70" stroke="white" stroke-width="2"/>
    <circle cx="12" cy="18" r="2" fill="white"/>
    <circle cx="12" cy="32" r="2" fill="white"/>
    <circle cx="12" cy="46" r="2" fill="white"/>
  </g>

  <!-- Violin -->
  <g class="navy" transform="translate(385,215)">
    <ellipse cx="0" cy="50" rx="18" ry="30"/>
    <ellipse cx="0" cy="18" rx="12" ry="22"/>
    <rect x="-2" y="-30" width="4" height="40"/>
    <line x1="0" y1="-30" x2="25" y2="70" stroke="#10263f" stroke-width="4"/>
  </g>

  <!-- Dancing couple -->
  <g class="navy">
    <!-- Left dancer -->
    <circle cx="220" cy="145" r="14"/>
    <path d="M220 160
             C205 180, 198 205, 202 235
             C206 260, 195 285, 180 310
             L205 310
             C220 286, 228 262, 228 235
             C228 205, 235 180, 248 165 Z"/>
    <path d="M205 190 L175 220 L183 230 L212 205 Z"/>
    <!-- Right dancer -->
    <circle cx="292" cy="145" r="14"/>
    <path d="M292 160
             C306 180, 312 205, 308 235
             C304 260, 314 285, 330 310
             L305 310
             C290 286, 282 262, 282 235
             C282 205, 275 180, 262 165 Z"/>
    <path d="M307 190 L337 220 L329 230 L300 205 Z"/>
    <!-- Joined hands -->
    <rect x="242" y="177" width="28" height="6" rx="3"/>
  </g>

  <!-- Text -->
  <text x="256" y="365" text-anchor="middle" class="navy text-main" font-size="56">BALFOLK</text>
</svg>
